name: Skill CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: skill-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation deps
        run: python -m pip install --upgrade pip pyyaml

      - name: Compile scripts
        run: python -c "from pathlib import Path; files=sorted(Path('scripts').glob('*.py')); [compile(path.read_text(encoding='utf-8'), str(path), 'exec') for path in files]; print('compiled', len(files), 'files')"

      - name: Validate schema JSON
        run: python -c "import json, pathlib; json.loads(pathlib.Path('references/cicd-bootstrap.schema.json').read_text(encoding='utf-8')); print('schema ok')"

      - name: Smoke test templates
        run: python3 scripts/smoke_test_templates.py

      - name: Verify workflow snapshots
        run: python3 scripts/verify_template_snapshots.py
